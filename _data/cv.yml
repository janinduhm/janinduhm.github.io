    Experience:
      - company: Rohde & Schwarz GmbH & Co. KG
        position: Master Thesis Student
        location: München, Germany
        start_date: 2025-10
        end_date: 2026-04
        highlights:
          - Designed FDSS pulse filters with symmetric spectral extension (SE) for DFT-s-OFDM waveforms, recovering ~2 dB BER penalty under MMSE equalization.
          - Performed constrained waveform optimization over a 630-configuration parameter grid, balancing PAPR, ACLR, and throughput against 3GPP Power Class 3 limits.
          - Benchmarked optimized FDSS waveform against CP-OFDM, DFT-s-OFDM, and OTFS across AWGN, TDL-D, and TDL-C channel models; achieved PAPR as low as 2.87 dB while satisfying ACLR ≥ 30 dBc.
          - "Tools: MATLAB (5G NR Toolbox, Communications Toolbox, Signal Processing Toolbox, Parallel Computing Toolbox)"

      - company: University of Sri Jayewardenepura
        position: Temporary Demonstrator
        location: Colombo, Sri Lanka
        start_date: 2022-01
        end_date: 2023-06
        highlights:
          - Assisted with lab preparation, practical design, teaching support, evaluations, and workshops in the Department of Electrical and Electronic Engineering.
          - Gained hands-on experience across electronics, communication systems, embedded systems, signal processing, automation, IoT, and power systems.
          - Programmed ATmega328P and ESP32 microcontrollers; configured VLANs, DHCP/DNS on Cisco hardware.
          - "Tools: Arduino UNO, ESP32, Raspberry Pi, Atmel Studio, Proteus, Cisco Packet Tracer, NI Multisim"

      - company: Self-Employed (Fiverr)
        position: Freelance Engineer
        location: Remote
        start_date: 2022-09
        end_date: 2023-08
        highlights:
          - Developed a web-based IoT Visualization Interface for real-time sensor data display on Google Maps, integrating MQTT and Node-RED for live map updates and marker control.
          - Designed a coordinated system integrating a differential drive mobile robot and a 3-DoF RRR manipulator for autonomous object transfer, implementing GPS-based navigation and inverse kinematics.
          - "Tools: Node-RED, Google Maps API, JavaScript, MQTT, Docker, Webots, MATLAB"

      - company: Sri Lanka Telecom PLC
        position: Telecommunication Engineer Intern
        location: Colombo, Sri Lanka
        start_date: 2020-02
        end_date: 2020-08
        highlights:
          - Worked in the Planning, Maintenance, and Network (Switching and Transmission) divisions.
          - Gained hands-on experience in fiber splicing, OTDR-based verification, and fault diagnosis.
          - Assisted with ADSL/FTTH router configuration, WDM/MPLS Layer 2/3 VPN provisioning, and maintenance of MSAN and eNodeB infrastructures.
          - "Tools: Fusion Splicer (Sumitomo T-400S), OTDR, Power Meter (FPM-300), MSAN, Clarity OSS"

    Projects:
      - name: Pulse Design for Pre-6G Mobile Radio Systems
        start_date: 2025-10
        end_date: present
        highlights:
          - Implemented link-level simulations of CP-OFDM, DFT-s-OFDM, FDSS-enhanced DFT-s-OFDM, and OTFS across AWGN and 3GPP fading channels.
          - Validated optimal FDSS design over 5×10⁶ simulation slots; FDSS achieved PAPR 5.81 dB below CP-OFDM baseline.
          - "Tools: MATLAB (5G NR Toolbox, Communications Toolbox, Signal Processing Toolbox, Parallel Computing Toolbox)"

      - name: SAE-CNN Based Indoor Positioning System
        start_date: 2025-04
        end_date: 2025-08
        highlights:
          - Deep learning-based indoor positioning using Wi-Fi fingerprints with a stacked autoencoder (SAE) for feature compression and 1D-CNN for classification.
          - "Tools: MATLAB (Deep Learning Toolbox)"

      - name: Versatile Indoor Positioning System
        start_date: 2020-10
        end_date: 2021-06
        highlights:
          - Cost-effective indoor positioning using Wi-Fi RSSIs and accelerometer data with a shallow neural network for location classification.
          - "Tools: Python (TensorFlow, Keras), Android Studio"

      - name: Autonomous Search Rescue System
        start_date: 2020-10
        end_date: 2021-02
        highlights:
          - Systems design study for a fully autonomous marine rescue platform using UAV and ASV coordination with deep learning-based victim detection.

      - name: Gesture-Controlled Smart Room Kit
        start_date: 2020-03
        end_date: 2021-06
        highlights:
          - Smart home system converting conventional appliances to Wi-Fi-enabled devices controllable via smartphone.
          - "Tools: NodeMCU (ESP8266), Android Studio"

      - name: Root-Finding IC Design
        start_date: 2019-11
        end_date: 2020-01
        highlights:
          - Digital IC for root-finding using IEEE-754 16-bit floating-point with FPU and Taylor series approximation.
          - "Tools: Verilog HDL"

